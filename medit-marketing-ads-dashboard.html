<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medit Ads Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090e;
  --surface: #111118;
  --surface2: #18181f;
  --surface3: #1e1e28;
  --border: #252530;
  --border2: #2e2e3d;
  --text: #e2e2ec;
  --text2: #a0a0b8;
  --muted: #52526a;
  --google: #4285f4;
  --google2: #a8c5ff;
  --meta: #0866ff;
  --meta2: #80b0ff;
  --accent: #7c6fff;
  --accent2: #b0a8ff;
  --green: #22d3a0;
  --green2: #6effd8;
  --yellow: #f0c040;
  --red: #ff5e5e;
  --red2: #ffaaaa;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(circle at 20% 20%,rgba(124,111,255,.04) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(66,133,244,.04) 0%,transparent 50%); pointer-events:none; z-index:0; }
.app { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }
header { padding:22px 36px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; background:rgba(9,9,14,.85); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
.logo-eyebrow { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
.logo-title { font-size:20px; font-weight:800; letter-spacing:-.02em; }
.logo-title span { color:var(--accent2); }
.status-pill { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; color:var(--green); background:rgba(34,211,160,.08); border:1px solid rgba(34,211,160,.2); padding:5px 12px; border-radius:20px; }
.status-pill::before { content:''; width:5px; height:5px; background:var(--green); border-radius:50%; animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.main { display:flex; flex:1; }
.sidebar { width:300px; flex-shrink:0; border-right:1px solid var(--border); padding:20px 16px; display:flex; flex-direction:column; gap:20px; background:var(--surface); overflow-y:auto; max-height:calc(100vh - 69px); position:sticky; top:69px; overflow-x:hidden; }
.sidebar-section { display:flex; flex-direction:column; gap:8px; }
.sidebar-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; padding-bottom:5px; border-bottom:1px solid var(--border); }
.date-inputs { display:flex; flex-direction:column; gap:5px; }
.date-row { display:flex; align-items:center; gap:7px; }
.date-row label { font-family:var(--mono); font-size:10px; color:var(--text2); width:28px; flex-shrink:0; }
input[type="date"] { flex:1; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:11px; padding:6px 9px; outline:none; transition:border-color .2s; }
input[type="date"]:focus { border-color:var(--accent); }
input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(.6); cursor:pointer; }
.preset-btns { display:flex; flex-wrap:wrap; gap:4px; }
.preset-btn { font-family:var(--mono); font-size:10px; padding:4px 9px; border-radius:5px; border:1px solid var(--border2); background:var(--surface2); color:var(--text2); cursor:pointer; letter-spacing:.06em; transition:all .15s; }
.preset-btn:hover,.preset-btn.active { border-color:var(--accent); color:var(--accent2); background:rgba(124,111,255,.08); }
.platform-toggles { display:flex; flex-direction:column; gap:5px; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:9px 11px; border-radius:7px; border:1px solid var(--border); cursor:pointer; transition:all .15s; }
.toggle-row.active.google { border-color:rgba(66,133,244,.4); background:rgba(66,133,244,.06); }
.toggle-row.active.meta { border-color:rgba(8,102,255,.4); background:rgba(8,102,255,.06); }
.toggle-name { font-family:var(--mono); font-size:12px; display:flex; align-items:center; gap:7px; }
.dot { width:7px; height:7px; border-radius:50%; }
.dot.google { background:var(--google); }
.dot.meta { background:var(--meta); }
.toggle-switch { width:30px; height:17px; border-radius:9px; background:var(--border2); position:relative; transition:background .2s; }
.toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:11px; height:11px; border-radius:50%; background:var(--muted); transition:all .2s; }
.toggle-row.active .toggle-switch { background:var(--accent); }
.toggle-row.active .toggle-switch::after { left:16px; background:white; }
.metrics-list { display:flex; flex-direction:column; gap:4px; }
.metric-check { display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:6px; cursor:pointer; transition:background .15s; border:1px solid transparent; }
.metric-check:hover { background:var(--surface2); }
.metric-check.selected { background:rgba(124,111,255,.07); border-color:rgba(124,111,255,.2); }
.metric-check input { display:none; }
.check-box { width:13px; height:13px; border-radius:3px; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
.metric-check.selected .check-box { background:var(--accent); border-color:var(--accent); }
.check-box::after { content:'✓'; font-size:9px; color:white; opacity:0; }
.metric-check.selected .check-box::after { opacity:1; }
.metric-label { font-family:var(--mono); font-size:11px; color:var(--text2); }
.metric-check.selected .metric-label { color:var(--text); }
.campaign-filter-wrap { position:relative; }
.search-input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:11px; padding:6px 9px 6px 26px; outline:none; transition:border-color .2s; }
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:12px; pointer-events:none; }
.campaign-list { display:flex; flex-direction:column; gap:3px; max-height:220px; overflow-y:auto; background:transparent; }
.campaign-item { font-family:var(--mono); font-size:10px; padding:5px 8px; border-radius:5px; cursor:pointer; color:#a0a0b8; border:1px solid transparent; white-space:normal; overflow:visible; word-break:break-word; line-height:1.4; transition:all .15s; display:block; width:100%; background:transparent; }
.campaign-item:hover { background:var(--surface2); color:var(--text); }
.campaign-item.selected { background:rgba(124,111,255,.08); border-color:rgba(124,111,255,.2); color:var(--text); }
.select-all-btn { font-family:var(--mono); font-size:10px; color:var(--accent2); background:none; border:none; cursor:pointer; text-align:left; padding:3px 0; letter-spacing:.05em; }
.apply-btn { width:100%; padding:11px; background:var(--accent); border:none; border-radius:7px; color:white; font-family:var(--mono); font-size:12px; font-weight:500; letter-spacing:.08em; cursor:pointer; transition:all .2s; text-transform:uppercase; }
.apply-btn:hover { background:var(--accent2); color:var(--bg); }
.content { flex:1; padding:24px 28px; overflow-y:auto; min-width:0; }
.nav-tabs { display:flex; gap:2px; margin-bottom:24px; border-bottom:1px solid var(--border); }
.nav-tab { font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:9px 16px; border:none; background:none; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.nav-tab:hover { color:var(--text2); }
.nav-tab.active { color:var(--accent2); border-bottom-color:var(--accent); }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; position:relative; overflow:hidden; }
.kpi-platform { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
.kpi-value { font-family:var(--mono); font-size:24px; font-weight:500; letter-spacing:-.02em; line-height:1; margin-bottom:4px; }
.kpi-label { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:.05em; }
.kpi-bar { position:absolute; bottom:0; left:0; height:2px; }
.kpi-bar.google { background:var(--google); }
.kpi-bar.meta { background:var(--meta); }
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
.chart-row.full { grid-template-columns:1fr; }
@media (max-width:1100px) { .chart-row { grid-template-columns:1fr; } }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-title { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:.12em; text-transform:uppercase; }
.card-badge { font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:4px; letter-spacing:.05em; }
.card-badge.google { background:rgba(66,133,244,.1); color:var(--google2); border:1px solid rgba(66,133,244,.2); }
.card-badge.meta { background:rgba(8,102,255,.1); color:var(--meta2); border:1px solid rgba(8,102,255,.2); }
.card-badge.combined { background:rgba(124,111,255,.1); color:var(--accent2); border:1px solid rgba(124,111,255,.2); }
.chart-wrap { position:relative; height:230px; }
.chart-wrap.tall { height:300px; }
.rank-table { width:100%; border-collapse:collapse; }
.rank-table th { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; padding:8px 10px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
.rank-table td { padding:10px 10px; font-family:var(--mono); font-size:11px; border-bottom:1px solid rgba(37,37,48,.6); vertical-align:middle; }
.rank-table tr:last-child td { border-bottom:none; }
.rank-table tr:hover td { background:var(--surface2); }
.rank-num { font-size:10px; color:var(--muted); width:22px; text-align:center; }
.rank-name { font-family:var(--sans); font-size:12px; font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.platform-tag { font-family:var(--mono); font-size:9px; padding:2px 6px; border-radius:3px; }
.platform-tag.google { background:rgba(66,133,244,.1); color:var(--google2); }
.platform-tag.meta { background:rgba(8,102,255,.1); color:var(--meta2); }
.score-bar-wrap { display:flex; align-items:center; gap:7px; }
.score-bar-track { width:70px; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:2px; }
.efficiency-badge { font-family:var(--mono); font-size:9px; padding:2px 6px; border-radius:4px; }
.efficiency-badge.high { background:rgba(34,211,160,.1); color:var(--green2); }
.efficiency-badge.mid { background:rgba(240,192,64,.1); color:var(--yellow); }
.efficiency-badge.low { background:rgba(255,94,94,.1); color:var(--red2); }
.insight-box { background:linear-gradient(135deg,rgba(124,111,255,.08),rgba(66,133,244,.04)); border:1px solid rgba(124,111,255,.2); border-radius:var(--radius); padding:22px; margin-bottom:16px; }
.insight-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.insight-icon { width:30px; height:30px; background:rgba(124,111,255,.15); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.insight-title { font-size:14px; font-weight:700; }
.insight-subtitle { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.07em; }
.insight-content { font-family:var(--mono); font-size:12px; color:var(--text2); line-height:1.8; white-space:pre-wrap; min-height:80px; }
.insight-loading { display:flex; align-items:center; gap:10px; color:var(--muted); font-family:var(--mono); font-size:12px; }
.insight-spinner { width:14px; height:14px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.insight-actions { margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }
.insight-btn { font-family:var(--mono); font-size:10px; padding:6px 12px; border-radius:5px; border:1px solid rgba(124,111,255,.3); background:rgba(124,111,255,.08); color:var(--accent2); cursor:pointer; letter-spacing:.06em; transition:all .15s; }
.insight-btn:hover { background:rgba(124,111,255,.15); }
.insight-btn:disabled { opacity:.4; cursor:not-allowed; }
.loading-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:280px; gap:12px; }
.loading-spinner { width:32px; height:32px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
.loading-msg { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.1em; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
@media (max-width:900px) { .sidebar { display:none; } .content { padding:16px; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-eyebrow">Medit Corp · Marketing Intelligence</div>
      <div class="logo-title">Ads <span>Analytics</span></div>
    </div>
    <button onclick="exportExcel()" style="font-family:var(--mono);font-size:11px;padding:7px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;letter-spacing:.06em;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text)'">↓ Export Excel</button>
<div class="status-pill" id="statusPill">Ready</div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Date Range</div>
        <div class="preset-btns">
          <button class="preset-btn" onclick="setPreset(7,event)">7D</button>
          <button class="preset-btn active" onclick="setPreset(30,event)">30D</button>
          <button class="preset-btn" onclick="setPreset(60,event)">60D</button>
          <button class="preset-btn" onclick="setPreset(90,event)">90D</button>
        </div>
        <div class="date-inputs">
          <div class="date-row"><label>From</label><input type="date" id="startDate"></div>
          <div class="date-row"><label>To</label><input type="date" id="endDate"></div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Platform</div>
        <div class="platform-toggles">
          <div class="toggle-row active google" id="toggleGoogle" onclick="togglePlatform('google')">
            <div class="toggle-name"><span class="dot google"></span>Google Ads</div>
            <div class="toggle-switch"></div>
          </div>
          <div class="toggle-row active meta" id="toggleMeta" onclick="togglePlatform('meta')">
            <div class="toggle-name"><span class="dot meta"></span>Meta Ads</div>
            <div class="toggle-switch"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Metrics</div>
        <div class="metrics-list">
          <label class="metric-check selected"><input type="checkbox" value="impressions" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">Impressions</span></label>
          <label class="metric-check selected"><input type="checkbox" value="clicks" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">Clicks</span></label>
          <label class="metric-check selected"><input type="checkbox" value="ctr" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">CTR (%)</span></label>
          <label class="metric-check selected"><input type="checkbox" value="spend" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">Spend</span></label>
          <label class="metric-check selected"><input type="checkbox" value="cpm" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">CPM</span></label>
          <label class="metric-check selected"><input type="checkbox" value="cpc" checked onchange="toggleMetric(this)"><div class="check-box"></div><span class="metric-label">CPC</span></label>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Campaigns</div>
        <div class="campaign-filter-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" type="text" id="campaignSearch" placeholder="Search..." oninput="filterCampaigns()">
        </div>
        <button class="select-all-btn" onclick="selectAllCampaigns()">Select all / Deselect all</button>
        <div class="campaign-list" id="campaignList"></div>
      </div>
      <button class="apply-btn" onclick="applyFilters()">Apply & Analyze</button>
    </aside>
    <div class="content">
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchPanel('overview',this)">Overview</button>
        <button class="nav-tab" onclick="switchPanel('trends',this)">Trends</button>
        <button class="nav-tab" onclick="switchPanel('ranking',this)">Ranking</button>
        <button class="nav-tab" onclick="switchPanel('compare',this)">Compare</button>
        <button class="nav-tab" onclick="switchPanel('geo',this)">Geo</button>
        <button class="nav-tab" onclick="switchPanel('device',this)">Device</button>
        <button class="nav-tab" onclick="switchPanel('insights',this)">AI Insights</button>
      </div>
      <div id="contentArea">
        <div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-msg">Loading data...</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const WORKER='https://black-pine-7262.jinhyuk-medit.workers.dev';
const state={gSummary:[],fbSummary:[],gDaily:[],fbDaily:[],gGeo:[],gDevice:[],fbGeo:[],fbDevice:[],fbPlatform:[],platforms:{google:true,meta:true},metrics:['impressions','clicks','ctr','spend','cpm','cpc'],selectedCampaigns:new Set(),allCampaigns:[],dateStart:'',dateEnd:'',loaded:false,currentPanel:'overview'};
const charts={};

function init(){setPreset(30,null,false);loadData();}

function getDefaultDates(days){const e=new Date(),s=new Date();s.setDate(e.getDate()-days);return{start:s.toISOString().split('T')[0],end:e.toISOString().split('T')[0]};}

function setPreset(days,evt,apply=true){
  const{start,end}=getDefaultDates(days);
  document.getElementById('startDate').value=start;
  document.getElementById('endDate').value=end;
  state.dateStart=start;state.dateEnd=end;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(evt&&evt.target)evt.target.classList.add('active');
  if(apply)applyFilters();
}

function togglePlatform(p){
  state.platforms[p]=!state.platforms[p];
  document.getElementById('toggle'+(p==='google'?'Google':'Meta')).classList.toggle('active',state.platforms[p]);
}

function toggleMetric(el){
  const v=el.value;
  el.closest('.metric-check').classList.toggle('selected',el.checked);
  if(el.checked){if(!state.metrics.includes(v))state.metrics.push(v);}
  else{state.metrics=state.metrics.filter(m=>m!==v);}
}


function selectAllCampaigns(){
  const allSel=state.selectedCampaigns.size===state.allCampaigns.length;
  if(allSel)state.selectedCampaigns.clear();
  else state.allCampaigns.forEach(c=>state.selectedCampaigns.add(c));
  renderCampaignList();
}

function renderCampaignList(){
  const list=document.getElementById('campaignList');
  if(!list)return;
  while(list.firstChild)list.removeChild(list.firstChild);
  state.allCampaigns.forEach(function(c){
    const el=document.createElement('div');
    el.className='campaign-item'+(state.selectedCampaigns.has(c)?' selected':'');
    const label=c.length>32?c.slice(0,32)+'…':c;
    el.appendChild(document.createTextNode(label));
    el.title=c;
    el.addEventListener('click',function(){
      if(state.selectedCampaigns.has(c))state.selectedCampaigns.delete(c);
      else state.selectedCampaigns.add(c);
      el.classList.toggle('selected',state.selectedCampaigns.has(c));
    });
    list.appendChild(el);
  });
}

function filterCampaigns(){
  const q=document.getElementById('campaignSearch').value.toLowerCase();
  document.querySelectorAll('.campaign-item').forEach((el,i)=>{
    el.style.display=state.allCampaigns[i]?.toLowerCase().includes(q)?'':'none';
  });
}

function fetchWithTimeout(url,timeout=25000){
  return Promise.race([
    fetch(url).then(r=>r.json()),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),timeout))
  ]);
}

async function loadData(){
  setStatus('Loading…',false);
  const s=document.getElementById('startDate').value,e=document.getElementById('endDate').value;
  state.dateStart=s;state.dateEnd=e;
  const area=document.getElementById('contentArea');

  // Step 1: Google Ads (순차 - 동일 OAuth token 재사용 위해)
  area.innerHTML=`<div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-msg">Loading Google Ads data…</div></div>`;
  const gUrl=m=>`${WORKER}/googleads?start_date=${s}&end_date=${e}&mode=${m}`;
  const gSum  = await fetchWithTimeout(gUrl('summary')).catch(()=>({results:[]}));
  const gDay  = await fetchWithTimeout(gUrl('daily')).catch(()=>({results:[]}));
  const gGeo  = await fetchWithTimeout(gUrl('geo')).catch(()=>({results:[]}));
  const gDev  = await fetchWithTimeout(gUrl('device')).catch(()=>({results:[]}));

  // Step 2: Meta Ads (병렬 가능 - 토큰 고정)
  area.innerHTML=`<div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-msg">Loading Meta Ads data…</div></div>`;
  const fbUrl=m=>`${WORKER}/facebookads?start_date=${s}&end_date=${e}&mode=${m}`;
  const[fbSum,fbDay,fbGeo,fbDev,fbPlat]=await Promise.all([
    fetchWithTimeout(fbUrl('summary')).catch(()=>({data:[]})),
    fetchWithTimeout(fbUrl('daily')).catch(()=>({data:[]})),
    fetchWithTimeout(fbUrl('geo')).catch(()=>({data:[]})),
    fetchWithTimeout(fbUrl('device')).catch(()=>({data:[]})),
    fetchWithTimeout(fbUrl('platform')).catch(()=>({data:[]})),
  ]);

  state.gSummary=gSum.results||[];state.fbSummary=fbSum.data||[];
  state.gDaily=gDay.results||[];state.fbDaily=fbDay.data||[];
  state.gGeo=gGeo.results||[];state.gDevice=gDev.results||[];
  state.fbGeo=fbGeo.data||[];state.fbDevice=fbDev.data||[];state.fbPlatform=fbPlat.data||[];
  state.loaded=true;
  const gCamps=[...new Set(state.gSummary.map(r=>r.campaign.name))];
  const fbCamps=[...new Set(state.fbSummary.map(r=>r.campaign_name))];
  state.allCampaigns=[...gCamps,...fbCamps];
  state.selectedCampaigns=new Set(state.allCampaigns);
  renderCampaignList();
  setStatus('Live · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),true);
  renderPanel(state.currentPanel);
}

async function applyFilters(){await loadData();}

function setStatus(msg,live){const el=document.getElementById('statusPill');el.textContent=msg;el.style.color=live?'var(--green)':'var(--yellow)';}

function switchPanel(name,btn){
  state.currentPanel=name;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(state.loaded)renderPanel(name);
}

function destroyCharts(){Object.values(charts).forEach(c=>c.destroy());Object.keys(charts).forEach(k=>delete charts[k]);}

function renderPanel(name){
  document.getElementById('contentArea').innerHTML='';
  destroyCharts();
  if(name==='overview')renderOverview();
  else if(name==='trends')renderTrends();
  else if(name==='ranking')renderRanking();
  else if(name==='compare')renderCompare();
  else if(name==='geo')renderGeo();
  else if(name==='device')renderDevice();
  else if(name==='insights')renderInsights();
}

const fG=()=>state.platforms.google?state.gSummary.filter(r=>state.selectedCampaigns.has(r.campaign.name)):[];
const fFb=()=>state.platforms.meta?state.fbSummary.filter(r=>state.selectedCampaigns.has(r.campaign_name)):[];
const fGD=()=>state.platforms.google?state.gDaily.filter(r=>state.selectedCampaigns.has(r.campaign.name)):[];
const fFbD=()=>state.platforms.meta?state.fbDaily.filter(r=>state.selectedCampaigns.has(r.campaign_name)):[];

function aggG(d){return d.reduce((a,r)=>{a.impr+=parseInt(r.metrics.impressions||0);a.clicks+=parseInt(r.metrics.clicks||0);a.cost+=parseInt(r.metrics.costMicros||0)/1e6;return a;},{impr:0,clicks:0,cost:0});}
function aggFb(d){return d.reduce((a,r)=>{a.impr+=parseInt(r.impressions||0);a.clicks+=parseInt(r.clicks||0);a.spend+=parseFloat(r.spend||0);a.video_view+=parseInt(r.video_p_3_sec_watched_actions||0);a.vp25+=parseInt(r.video_p25_watched_actions||0);a.vp50+=parseInt(r.video_p50_watched_actions||0);a.vp75+=parseInt(r.video_p75_watched_actions||0);a.vp100+=parseInt(r.video_p100_watched_actions||0);return a;},{impr:0,clicks:0,spend:0,video_view:0,vp25:0,vp50:0,vp75:0,vp100:0});}
function derived(impr,clicks,cost){return{ctr:impr>0?clicks/impr*100:0,cpm:impr>0?cost/impr*1000:0,cpc:clicks>0?cost/clicks:0};}

const fmt=n=>Number(n).toLocaleString();
const fUSD=n=>'₩'+Math.round(Number(n)).toLocaleString();
const fKRW=n=>'₩'+Math.round(n).toLocaleString();
const fPct=n=>Number(n).toFixed(2)+'%';

const cDefaults=()=>({plugins:{legend:{display:false},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',padding:9,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:10}}},scales:{x:{ticks:{color:'#52526a',font:{family:'DM Mono',size:10}},grid:{color:'rgba(37,37,48,.5)'}},y:{ticks:{color:'#52526a',font:{family:'DM Mono',size:10}},grid:{color:'rgba(37,37,48,.5)'}}},responsive:true,maintainAspectRatio:false,animation:{duration:350}});

// ── Ranking ──
function renderRanking(){
  const rows=[];
  fG().forEach(r=>{const impr=parseInt(r.metrics.impressions||0),clicks=parseInt(r.metrics.clicks||0),cost=parseInt(r.metrics.costMicros||0)/1e6,ctr=impr>0?clicks/impr*100:0,cpm=impr>0?cost/impr*1000:0,cpc=clicks>0?cost/clicks:0;rows.push({name:r.campaign.name,p:'google',impr,clicks,ctr,spend:cost,cpm,cpc,cur:'KRW'});});
  fFb().forEach(r=>{const impr=parseInt(r.impressions||0),clicks=parseInt(r.clicks||0),spend=parseFloat(r.spend||0),ctr=parseFloat(r.ctr||0),cpm=impr>0?spend/impr*1000:0,cpc=clicks>0?spend/clicks:0;rows.push({name:r.campaign_name,p:'meta',impr,clicks,ctr,spend,cpm,cpc,cur:'KRW'});});
  const maxCTR=Math.max(...rows.map(r=>r.ctr),.01);
  rows.forEach(r=>{r.score=r.ctr/maxCTR*100;});
  rows.sort((a,b)=>b.score-a.score);
  const bg=s=>s>=70?'high':s>=40?'mid':'low';
  const bl=s=>s>=70?'● High':s>=40?'● Mid':'● Low';
  document.getElementById('contentArea').innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">Campaign Efficiency Ranking · CTR Score</span></div>
      <div style="overflow-x:auto"><table class="rank-table">
        <thead><tr><th>#</th><th>Campaign</th><th>Platform</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>Spend</th><th>CPC</th><th>Score</th><th>Grade</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td><div class="rank-name">${r.name}</div></td><td><span class="platform-tag ${r.p}">${r.p==='google'?'Google':'Meta'}</span></td><td style="color:var(--text2)">${fmt(r.impr)}</td><td style="color:var(--text2)">${fmt(r.clicks)}</td><td>${fPct(r.ctr)}</td><td style="color:var(--text2)">${r.cur==='USD'?fUSD(r.spend):fKRW(r.spend)}</td><td style="color:var(--text2)">${r.cur==='USD'?fUSD(r.cpc):fKRW(r.cpc)}</td><td><div class="score-bar-wrap"><span style="color:var(--text);width:28px">${r.score.toFixed(0)}</span><div class="score-bar-track"><div class="score-bar-fill" style="width:${r.score}%;background:${r.score>=70?'var(--green)':r.score>=40?'var(--yellow)':'var(--red)'}"></div></div></div></td><td><span class="efficiency-badge ${bg(r.score)}">${bl(r.score)}</span></td></tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

    executive:`메디트 경영진을 위한 디지털 광고 성과 요약을 작성하세요. 핵심 수치와 비즈니스 임팩트를 불릿 포인트로 한국어로 전달하고, 반드시 완전한 문장으로 마무리하세요.\n\n${ctx}`,
    recommend:`디지털 마케팅 전략가로서 아래 성과 데이터를 기반으로 캠페인 성과를 개선하기 위한 구체적이고 실행 가능한 권고사항 한국어로 작성하세요. 각 권고사항에는 구체적인 데이터 근거를 포함하고, 반드시 완전한 문장으로 마무리하세요.\n\n${ctx}`,
  };
  try{
    const res=await fetch(WORKER+'/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompts[type]}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    el.textContent=data.content?.find(b=>b.type==='text')?.text||'분석 결과를 가져올 수 없습니다.';
  }catch(e){el.textContent='⚠ AI 분석 중 오류: '+e.message;}
  document.querySelectorAll('.insight-btn').forEach(b=>b.disabled=false);
}

        <thead><tr><th>#</th><th>Country</th><th>Group</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>Spend (KRW)</th></tr></thead>
        <tbody id="geoFbTableBody"></tbody>
      </table></div>
    </div>`;

  // ── Google Ads ──
  const byCountry={};
  state.gGeo.forEach(r=>{
    const id=String(r.geographicView?.countryCriterionId||'');
    const name=COUNTRY_MAP[id]||('ID:'+id);
    if(!byCountry[name])byCountry[name]={impr:0,clicks:0,cost:0};
    byCountry[name].impr+=parseInt(r.metrics.impressions||0);
    byCountry[name].clicks+=parseInt(r.metrics.clicks||0);
    byCountry[name].cost+=parseInt(r.metrics.costMicros||0)/1e6;
  });

  const byGroup={Group1:{cost:0,impr:0},Group2:{cost:0,impr:0},Group3:{cost:0,impr:0},Group4:{cost:0,impr:0},Other:{cost:0,impr:0}};
  Object.entries(byCountry).forEach(([country,d])=>{
    const g=GROUP_MAP[country]||'Other';
    byGroup[g].cost+=d.cost;
    byGroup[g].impr+=d.impr;

  const sorted=Object.entries(byCountry).filter(([,d])=>d.cost>0||d.impr>0).sort((a,b)=>b[1].cost-a[1].cost);

    sorted.forEach(([country,d],i)=>{
      const g=GROUP_MAP[country]||'Other';
      const ctr=d.impr>0?d.clicks/d.impr*100:0;

  state.fbGeo.forEach(r=>{

  const sortedFb=Object.entries(byFbCountry).filter(([,d])=>d.spend>0||d.impr>0).sort((a,b)=>b[1].spend-a[1].spend);

    sortedFb.forEach(([country,d],i)=>{
      const g=GROUP_MAP[country]||'Other';

      tbodyFb.appendChild(tr);
    });
  }

  setTimeout(()=>{
    const groups=Object.keys(byGroup);
    const c1=document.getElementById('geoGroupChart');
    if(c1)charts.geoG=new Chart(c1,{type:'doughnut',data:{labels:groups.map(g=>GROUP_LABELS[g]||g),datasets:[{data:groups.map(g=>byGroup[g].cost.toFixed(2)),backgroundColor:groups.map(g=>GROUP_COLORS[g]),borderWidth:2,borderColor:'#111118'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#a0a0b8',font:{family:'DM Mono',size:10},padding:10,boxWidth:12}},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}}}});

    if(c2)charts.geoFbG=new Chart(c2,{type:'doughnut',data:{labels:groups.map(g=>GROUP_LABELS[g]||g),datasets:[{data:groups.map(g=>byFbGroup[g].spend.toFixed(0)),backgroundColor:groups.map(g=>GROUP_COLORS[g]),borderWidth:2,borderColor:'#111118'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#a0a0b8',font:{family:'DM Mono',size:10},padding:10,boxWidth:12}},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}}}});

          }).join('')}</tbody>
        </table></div>
      </div>
    </div>`;
  area.appendChild(platSection);

  setTimeout(()=>{
    const c1=document.getElementById('devSpendChart');
    if(c1)charts.devS=new Chart(c1,{type:'doughnut',data:{labels:devices.map(d=>DEVICE_LABELS[d]||d),datasets:[{data:devices.map(d=>byDevice[d].cost.toFixed(2)),backgroundColor:devices.map(d=>DEVICE_COLORS[d]||'rgba(82,82,106,.5)'),borderWidth:2,borderColor:'#111118'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#a0a0b8',font:{family:'DM Mono',size:10},padding:10,boxWidth:12}},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}}}});
    const c2=document.getElementById('devFbSpendChart');
    if(c2)charts.devFbS=new Chart(c2,{type:'doughnut',data:{labels:fbDevices,datasets:[{data:fbDevices.map(d=>byFbDevice[d].spend.toFixed(0)),backgroundColor:fbDevices.map((_,i)=>['rgba(8,102,255,.7)','rgba(124,111,255,.7)','rgba(34,211,160,.7)','rgba(240,192,64,.7)'][i]||'rgba(82,82,106,.5)'),borderWidth:2,borderColor:'#111118'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#a0a0b8',font:{family:'DM Mono',size:10},padding:10,boxWidth:12}},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}}}});
    const c3=document.getElementById('devPlatChart');
    if(c3)charts.devPlat=new Chart(c3,{type:'doughnut',data:{labels:platList.map(p=>p.charAt(0).toUpperCase()+p.slice(1).replace('_',' ')),datasets:[{data:platList.map(p=>byPlat[p].spend.toFixed(0)),backgroundColor:platList.map(p=>PLAT_COLORS[p]||'rgba(82,82,106,.5)'),borderWidth:2,borderColor:'#111118'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#a0a0b8',font:{family:'DM Mono',size:10},padding:10,boxWidth:12}},tooltip:{backgroundColor:'#18181f',borderColor:'#2e2e3d',borderWidth:1,titleColor:'#e2e2ec',bodyColor:'#a0a0b8',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}}}});
  },50);
}


// ── Export Excel ──
function exportExcel(){
  if(!state.loaded){alert('데이터 로딩 후 다시 시도해 주세요.');return;}

  const wb=XLSX.utils.book_new();

  // ── Sheet 1: Google Ads Campaign ──
  const gCampHeaders=['Campaign','Impressions','Clicks','CTR (%)','Spend (KRW)','CPC (KRW)','Conversions'];
  const gCampRows=[gCampHeaders];
  state.gSummary.forEach(r=>{
    const impr=parseInt(r.metrics.impressions||0);
    const clicks=parseInt(r.metrics.clicks||0);
    const cost=parseInt(r.metrics.costMicros||0)/1e6;
    const ctr=impr>0?(clicks/impr*100):0;
    const cpc=clicks>0?(cost/clicks):0;
    gCampRows.push([r.campaign.name,impr,clicks,parseFloat(ctr.toFixed(2)),parseFloat(cost.toFixed(2)),parseFloat(cpc.toFixed(2)),parseFloat(r.metrics.conversions||0)]);
  });
  const gCampTotImpr=state.gSummary.reduce((s,r)=>s+parseInt(r.metrics.impressions||0),0);
  const gCampTotClicks=state.gSummary.reduce((s,r)=>s+parseInt(r.metrics.clicks||0),0);
  const gCampTotCost=state.gSummary.reduce((s,r)=>s+parseInt(r.metrics.costMicros||0)/1e6,0);
  const gCampTotCTR=gCampTotImpr>0?(gCampTotClicks/gCampTotImpr*100):0;
  const gCampTotCPC=gCampTotClicks>0?(gCampTotCost/gCampTotClicks):0;
  gCampRows.push(['TOTAL',gCampTotImpr,gCampTotClicks,parseFloat(gCampTotCTR.toFixed(2)),parseFloat(gCampTotCost.toFixed(2)),parseFloat(gCampTotCPC.toFixed(2)),'']);
  const wsCamp=XLSX.utils.aoa_to_sheet(gCampRows);
  wsCamp['!cols']=[{wch:50},{wch:16},{wch:12},{wch:10},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsCamp,'Google Ads - Campaign');

  // ── Sheet 2: Google Ads by Country ──
  const GROUP_ORDER=['Group1','Group2','Group3','Group4','Other'];
  const GROUP_COUNTRIES={
    Group1:['Netherlands','United Kingdom','Germany','Austria','Switzerland','Sweden','Australia','USA','South Korea','Canada'],
    Group2:['Italy','Spain','France'],
    Group3:['Poland','Portugal','UAE','South Africa','Kazakhstan','Brazil','Colombia','Mexico','Peru'],
    Group4:['India','Uzbekistan','Azerbaijan','Ukraine'],
    Other:[],
  };
  const GROUP_LABEL={
    Group1:'Group 1 (High-income / Mature Markets)',
    Group2:'Group 2 (Upper-Mid Market)',
    Group3:'Group 3 (Emerging but Growing)',
    Group4:'Group 4 (Developing / Price-Sensitive Markets)',
    Other:'Other',
  };

  // Build country→metrics map from gGeo (aggregate across campaigns per country)
  const countryData={};
  state.gGeo.forEach(r=>{
    const id=String(r.geographicView?.countryCriterionId||'');
    const country=COUNTRY_MAP[id]||('ID:'+id);
    const camp=r.campaign?.name||'Unknown';
    if(!countryData[country])countryData[country]={};
    if(!countryData[country][camp])countryData[country][camp]={impr:0,clicks:0,cost:0};
    countryData[country][camp].impr+=parseInt(r.metrics.impressions||0);
    countryData[country][camp].clicks+=parseInt(r.metrics.clicks||0);
    countryData[country][camp].cost+=parseInt(r.metrics.costMicros||0)/1e6;
  });

  // Get unique campaigns
  const gCamps=[...new Set(state.gGeo.map(r=>r.campaign?.name||'Unknown'))].sort();

  // Build headers
  const gHeaders=['Group','Country'];
  gCamps.forEach(c=>{
    gHeaders.push(c+' - Impressions');
    gHeaders.push(c+' - Clicks');
    gHeaders.push(c+' - CTR (%)');
    gHeaders.push(c+' - Spend (KRW)');
  });
  gHeaders.push('Total Impressions','Total Clicks','Total CTR (%)','Total Spend (KRW)');

  const gRows=[gHeaders];

  // Track which countries appeared in "Other"
  const mappedCountries=new Set([...GROUP_COUNTRIES.Group1,...GROUP_COUNTRIES.Group2,...GROUP_COUNTRIES.Group3,...GROUP_COUNTRIES.Group4]);

  // Find countries in data not in predefined groups
  Object.keys(countryData).forEach(c=>{if(!mappedCountries.has(c))GROUP_COUNTRIES.Other.push(c);});

  GROUP_ORDER.forEach(grp=>{
    const countries=GROUP_COUNTRIES[grp];
    countries.forEach((country,ci)=>{
      const row=[];
      row.push(ci===0?GROUP_LABEL[grp]:'');
      row.push(country);
      let totalImpr=0,totalClicks=0,totalCost=0;
      gCamps.forEach(camp=>{
        const d=(countryData[country]||{})[camp]||{impr:0,clicks:0,cost:0};
        const ctr=d.impr>0?(d.clicks/d.impr*100):0;
        row.push(d.impr,d.clicks,parseFloat(ctr.toFixed(2)),parseFloat(d.cost.toFixed(2)));
        totalImpr+=d.impr;totalClicks+=d.clicks;totalCost+=d.cost;
      });
      const totalCTR=totalImpr>0?(totalClicks/totalImpr*100):0;
      row.push(totalImpr,totalClicks,parseFloat(totalCTR.toFixed(2)),parseFloat(totalCost.toFixed(2)));
      gRows.push(row);
    });
  });

  const ws1=XLSX.utils.aoa_to_sheet(gRows);
  ws1['!cols']=[{wch:40},{wch:20},...gCamps.flatMap(()=>[{wch:16},{wch:10},{wch:10},{wch:14}]),{wch:16},{wch:12},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Google Ads - Country');

  // ── Sheet 2: Meta Ads Campaigns ──
  const fbHeaders=['Campaign','Impressions','Clicks','CTR (%)','Spend (KRW)'];
  const fbRows=[fbHeaders];
  state.fbSummary.forEach(r=>{
    const ctr=parseFloat(r.ctr||0);
    fbRows.push([r.campaign_name,parseInt(r.impressions||0),parseInt(r.clicks||0),parseFloat(ctr.toFixed(2)),Math.round(parseFloat(r.spend||0))]);
  });
  const fbTotImpr=state.fbSummary.reduce((s,r)=>s+parseInt(r.impressions||0),0);
  const fbTotClicks=state.fbSummary.reduce((s,r)=>s+parseInt(r.clicks||0),0);
  const fbTotSpend=state.fbSummary.reduce((s,r)=>s+parseFloat(r.spend||0),0);
  const fbTotCTR=fbTotImpr>0?(fbTotClicks/fbTotImpr*100):0;
  fbRows.push(['TOTAL',fbTotImpr,fbTotClicks,parseFloat(fbTotCTR.toFixed(2)),Math.round(fbTotSpend)]);
  const ws2=XLSX.utils.aoa_to_sheet(fbRows);
  ws2['!cols']=[{wch:50},{wch:16},{wch:12},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws2,'Meta Ads - Campaign');

  // ── Sheet 3: Meta Ads by Country ──
  // Build country data from fbGeo
  const fbCountryData={};
  state.fbGeo.forEach(r=>{
    const iso=r.country||'';
    const country=ISO_COUNTRY_MAP[iso]||(iso||'Unknown');
    const camp=r.campaign_name||'Unknown';
    if(!fbCountryData[country])fbCountryData[country]={};
    if(!fbCountryData[country][camp])fbCountryData[country][camp]={impr:0,clicks:0,spend:0};
    fbCountryData[country][camp].impr+=parseInt(r.impressions||0);
    fbCountryData[country][camp].clicks+=parseInt(r.clicks||0);
    fbCountryData[country][camp].spend+=parseFloat(r.spend||0);
  });

  const fbCamps=[...new Set(state.fbGeo.map(r=>r.campaign_name||'Unknown'))].sort();
  const fbGeoHeaders=['Group','Country'];
  fbCamps.forEach(c=>{
    fbGeoHeaders.push(c+' - Impressions');
    fbGeoHeaders.push(c+' - Clicks');
    fbGeoHeaders.push(c+' - CTR (%)');
    fbGeoHeaders.push(c+' - Spend (KRW)');
  });
  fbGeoHeaders.push('Total Impressions','Total Clicks','Total CTR (%)','Total Spend (KRW)');

  const fbGeoRows=[fbGeoHeaders];
  const mappedFbCountries=new Set([...GROUP_COUNTRIES.Group1,...GROUP_COUNTRIES.Group2,...GROUP_COUNTRIES.Group3,...GROUP_COUNTRIES.Group4]);
  Object.keys(fbCountryData).forEach(c=>{if(!mappedFbCountries.has(c))GROUP_COUNTRIES.Other.push(c);});

  GROUP_ORDER.forEach(grp=>{
    GROUP_COUNTRIES[grp].forEach((country,ci)=>{
      const row=[];
      row.push(ci===0?GROUP_LABEL[grp]:'');
      row.push(country);
      let totImpr=0,totClicks=0,totSpend=0;
      fbCamps.forEach(camp=>{
        const d=(fbCountryData[country]||{})[camp]||{impr:0,clicks:0,spend:0};
        const ctr=d.impr>0?(d.clicks/d.impr*100):0;
        row.push(d.impr,d.clicks,parseFloat(ctr.toFixed(2)),Math.round(d.spend));
        totImpr+=d.impr;totClicks+=d.clicks;totSpend+=d.spend;
      });
      const totCTR=totImpr>0?(totClicks/totImpr*100):0;
      row.push(totImpr,totClicks,parseFloat(totCTR.toFixed(2)),Math.round(totSpend));
      fbGeoRows.push(row);
    });
  });

  const ws3fb=XLSX.utils.aoa_to_sheet(fbGeoRows);
  ws3fb['!cols']=[{wch:40},{wch:20},...fbCamps.flatMap(()=>[{wch:16},{wch:10},{wch:10},{wch:16}]),{wch:16},{wch:12},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws3fb,'Meta Ads - Country');

  // ── Sheet 3: Google Ads Device ──
  const devHeaders=['Device','Impressions','Clicks','CTR (%)','Spend (KRW)','CPC (KRW)'];
  const devRows=[devHeaders];
  const DEVICE_LABELS={'MOBILE':'Mobile','DESKTOP':'Desktop','TABLET':'Tablet','CONNECTED_TV':'Connected TV','OTHER':'Other'};
  const devAgg={};
  state.gDevice.forEach(r=>{
    const dev=r.segments?.device||'OTHER';
    if(!devAgg[dev])devAgg[dev]={impr:0,clicks:0,cost:0};
    devAgg[dev].impr+=parseInt(r.metrics.impressions||0);
    devAgg[dev].clicks+=parseInt(r.metrics.clicks||0);
    devAgg[dev].cost+=parseInt(r.metrics.costMicros||0)/1e6;
  });
  Object.entries(devAgg).forEach(([dev,d])=>{
    const ctr=d.impr>0?d.clicks/d.impr*100:0;
    const cpc=d.clicks>0?d.cost/d.clicks:0;
    devRows.push([DEVICE_LABELS[dev]||dev,d.impr,d.clicks,parseFloat(ctr.toFixed(2)),parseFloat(d.cost.toFixed(2)),parseFloat(cpc.toFixed(2))]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(devRows);
  ws3['!cols']=[{wch:16},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws3,'Google Ads - Device');

  // ── Sheet 5: Meta Ads Device ──
  const fbDevHeaders=['Device','Impressions','Clicks','CTR (%)','Spend (KRW)','CPC (KRW)'];
  const fbDevRows=[fbDevHeaders];
  const fbDevAgg={};
  state.fbDevice.forEach(r=>{
    const dev=r.device_platform||'other';
    if(!fbDevAgg[dev])fbDevAgg[dev]={impr:0,clicks:0,spend:0};
    fbDevAgg[dev].impr+=parseInt(r.impressions||0);
    fbDevAgg[dev].clicks+=parseInt(r.clicks||0);
    fbDevAgg[dev].spend+=parseFloat(r.spend||0);
  });
  Object.entries(fbDevAgg).forEach(([dev,d])=>{
    const ctr=d.impr>0?d.clicks/d.impr*100:0;
    const cpc=d.clicks>0?d.spend/d.clicks:0;
    fbDevRows.push([dev,d.impr,d.clicks,parseFloat(ctr.toFixed(2)),Math.round(d.spend),Math.round(cpc)]);
  });
  const ws5fb=XLSX.utils.aoa_to_sheet(fbDevRows);
  ws5fb['!cols']=[{wch:18},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws5fb,'Meta Ads - Device');

  // ── Sheet 7: Meta Ads Video ──
  const fbVideoHeaders=['Campaign','Impressions','Video Views (3s+)','VTR (%)','25% View','50% View','75% View','100% View'];
  const fbVideoRows=[fbVideoHeaders];
  state.fbSummary.forEach(r=>{
    const impr=parseInt(r.impressions||0);
    const vv=parseInt(r.video_p_3_sec_watched_actions||0);
    const vtr=impr>0?(vv/impr*100):0;
    if(vv>0){
      fbVideoRows.push([
        r.campaign_name,
        impr,
        vv,
        parseFloat(vtr.toFixed(2)),
        parseInt(r.video_p25_watched_actions||0),
        parseInt(r.video_p50_watched_actions||0),
        parseInt(r.video_p75_watched_actions||0),
        parseInt(r.video_p100_watched_actions||0),
      ]);
    }
  });
  if(fbVideoRows.length>1){
    const ws7=XLSX.utils.aoa_to_sheet(fbVideoRows);
    ws7['!cols']=[{wch:50},{wch:14},{wch:16},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws7,'Meta Ads - Video');
  }

  // ── Sheet: Meta Ads Platform ──
  const fbPlatHeaders=['Platform','Impressions','Clicks','CTR (%)','Spend (KRW)','CPC (KRW)'];
  const fbPlatRows=[fbPlatHeaders];
  const fbPlatAgg={};
  state.fbPlatform.forEach(r=>{
    const p=r.publisher_platform||'unknown';
    if(!fbPlatAgg[p])fbPlatAgg[p]={impr:0,clicks:0,spend:0};
    fbPlatAgg[p].impr+=parseInt(r.impressions||0);
    fbPlatAgg[p].clicks+=parseInt(r.clicks||0);
    fbPlatAgg[p].spend+=parseFloat(r.spend||0);
  });
  Object.entries(fbPlatAgg).forEach(([p,d])=>{
    const ctr=d.impr>0?d.clicks/d.impr*100:0;
    const cpc=d.clicks>0?d.spend/d.clicks:0;
    const label=p.charAt(0).toUpperCase()+p.slice(1).replace('_',' ');
    fbPlatRows.push([label,d.impr,d.clicks,parseFloat(ctr.toFixed(2)),Math.round(d.spend),Math.round(cpc)]);
  });
  const wsPlt=XLSX.utils.aoa_to_sheet(fbPlatRows);
  wsPlt['!cols']=[{wch:20},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsPlt,'Meta Ads - Platform');

  // Download
  const dateStr=state.dateStart+'_'+state.dateEnd;
  XLSX.writeFile(wb,'Medit_Ads_Report_'+dateStr+'.xlsx');
}

init();
